AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OpenSearch Fine-Tuning POC - Automated pipeline for fine-tuning retrieval models
  using Bedrock synthetic data generation and SageMaker training.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "OpenSearch Configuration"
        Parameters:
          - OpenSearchEndpoint
          - OpenSearchIndexName
          - TextFieldNames
          - FineTuningLambdaInvokeOpenSearchRoleName
      - Label:
          default: "Model Configuration"
        Parameters:
          - ModelName
          - BaseModelId
      - Label:
          default: "Data Source Configuration"
        Parameters:
          - InputType
          - S3CorpusPath
          - SampleQueryUri
          - MaxCorpusDocuments
          - MaxQueryDocuments
      - Label:
          default: "Bedrock Configuration"
        Parameters:
          - BedrockModelId
          - DevLabelModelId
          - QueriesPerDocument
      - Label:
          default: "Training Configuration"
        Parameters:
          - ProcessingInstanceType
          - ScoringInstanceType
          - TrainingInstanceType
          - TrainBatchSize
          - MaxSteps
          - LearningRate
          - MaxSeqLength
          - EvalSteps
          - EarlyStoppingPatience
      - Label:
          default: "Deployment Configuration"
        Parameters:
          - DeployEndpoint
          - RegisterConnector
          - InferenceInstanceType
          - InitialInstanceCount
      - Label:
          default: "Lambda Source Configuration"
        Parameters:
          - DataExtractorLambdaZipUrl
          - S3ValidatorLambdaZipUrl
          - BedrockOrchestratorLambdaZipUrl
          - RegisterModelLambdaZipUrl
          - TrainingScriptZipUrl
    ParameterLabels:
      OpenSearchEndpoint:
        default: "OpenSearch Domain Endpoint"
      OpenSearchIndexName:
        default: "OpenSearch Index Name"
      TextFieldNames:
        default: "Text Field Names (comma-separated)"
      FineTuningLambdaInvokeOpenSearchRoleName:
        default: "Lambda OpenSearch Role Name"
      ModelName:
        default: "Model Name"
      BaseModelId:
        default: "Base Model ID"
      InputType:
        default: "Input Type (s3/opensearch)"
      S3CorpusPath:
        default: "S3 Corpus Path"
      SampleQueryUri:
        default: "Sample Query URI (Optional)"
      MaxCorpusDocuments:
        default: "Max Corpus Documents (BM25 pool)"
      MaxQueryDocuments:
        default: "Max Query Documents (Bedrock)"
      BedrockModelId:
        default: "Bedrock Model ID (Query Generation)"
      DevLabelModelId:
        default: "Bedrock Model ID (Dev Set Labeling)"
      QueriesPerDocument:
        default: "Queries Per Document"
      ProcessingInstanceType:
        default: "Processing Instance Type (CPU)"
      ScoringInstanceType:
        default: "Scoring Instance Type"
      TrainingInstanceType:
        default: "Training Instance Type"
      TrainBatchSize:
        default: "Per-Device Train Batch Size"
      MaxSteps:
        default: "Maximum Training Steps"
      LearningRate:
        default: "Learning Rate"
      MaxSeqLength:
        default: "Max Sequence Length"
      EvalSteps:
        default: "Dev Evaluation Frequency (steps)"
      EarlyStoppingPatience:
        default: "Early Stopping Patience"
      DeployEndpoint:
        default: "Deploy SageMaker Endpoint"
      RegisterConnector:
        default: "Register OpenSearch Connector"
      InferenceInstanceType:
        default: "Inference Instance Type"
      InitialInstanceCount:
        default: "Initial Instance Count"

Parameters:
  # OpenSearch Configuration
  OpenSearchEndpoint:
    Type: String
    Description: "OpenSearch domain endpoint (e.g., https://search-domain.us-east-1.es.amazonaws.com)"
    AllowedPattern: "https://.*|^$"
    ConstraintDescription: "Must be a valid OpenSearch endpoint starting with https:// or empty"
    Default: ""

  FineTuningLambdaInvokeOpenSearchRoleName:
    Type: String
    Default: "FineTuning-LambdaInvokeOpenSearchRole"
    AllowedPattern: "[a-zA-Z0-9+=,.@_-]+"
    ConstraintDescription: "Must use alphanumeric and '+=,.@-_' characters."
    Description: >
      The name of the IAM role used by Lambda to invoke OpenSearch domain.
      IMPORTANT: Before deploying this template, this role must be mapped to OpenSearch
      backend roles with appropriate permissions (e.g., ml_full_access for ML operations,
      or a custom role with index read access). The IAM role will be created by this
      template if it does not exist. You can use the default value or specify a custom name.

  OpenSearchIndexName:
    Type: String
    Description: "Name of the OpenSearch index to extract documents from (required if InputType is 'opensearch')"
    Default: ""

  TextFieldNames:
    Type: String
    Description: "Comma-separated field names containing document text in OpenSearch index (e.g., 'title,content,description'). Fields will be concatenated in order."
    Default: "content"

  # Model Configuration
  ModelName:
    Type: String
    Description: "Unique name for the fine-tuned model (alphanumeric, hyphens only, max 40 chars)"
    AllowedPattern: "^[a-zA-Z0-9](-*[a-zA-Z0-9]){0,39}"
    ConstraintDescription: "Max 40 chars, alphanumeric and hyphens only"

  BaseModelId:
    Type: String
    Description: "HuggingFace model ID for base model"
    Default: "BAAI/bge-m3"

  # Data Source Configuration
  InputType:
    Type: String
    Description: "Data source: 's3' for existing corpus or 'opensearch' to extract from index"
    AllowedValues: ["s3", "opensearch"]
    Default: "s3"

  S3CorpusPath:
    Type: String
    Description: "S3 path to corpus JSONL file (required if InputType is 's3'). Format: s3://bucket/path/corpus.jsonl"
    Default: ""

  SampleQueryUri:
    Type: String
    Description: >
      (Optional) S3 URI to a JSONL file with sample queries for few-shot prompting.
      Each line should have 'text', 'query', or 'anchor' field.
      When provided, 10 random samples are included in each prompt to guide query style.
    Default: ""

  MaxCorpusDocuments:
    Type: Number
    Description: "Maximum documents to sample for BM25 hard negative candidate pool"
    Default: 10000000
    MinValue: 1000
    MaxValue: 10000000

  MaxQueryDocuments:
    Type: Number
    Description: "Maximum documents to generate synthetic queries for via Bedrock"
    Default: 20000
    MinValue: 100
    MaxValue: 100000

  # Bedrock Configuration
  BedrockModelId:
    Type: String
    Description: "Bedrock model ID for synthetic query generation"
    Default: "us.anthropic.claude-haiku-4-5-20251001-v1:0"

  DevLabelModelId:
    Type: String
    Description: "Bedrock model ID for dev set LLM relevance labeling"
    Default: "us.anthropic.claude-sonnet-4-6"

  QueriesPerDocument:
    Type: Number
    Description: "Number of synthetic queries to generate per document"
    Default: 5
    MinValue: 1
    MaxValue: 10

  # Training Configuration
  ProcessingInstanceType:
    Type: String
    Description: "SageMaker instance type for data processing (CPU, no GPU needed)"
    Default: "ml.c5.4xlarge"
    AllowedValues:
      - "ml.m5.xlarge"
      - "ml.m5.2xlarge"
      - "ml.m5.4xlarge"
      - "ml.c5.2xlarge"
      - "ml.c5.4xlarge"

  ScoringInstanceType:
    Type: String
    Description: "SageMaker instance type for scoring (cross-encoder teacher)"
    Default: "ml.g5.2xlarge"
    AllowedValues:
      - "ml.g5.xlarge"
      - "ml.g5.2xlarge"
      - "ml.p4d.24xlarge"

  TrainingInstanceType:
    Type: String
    Description: "SageMaker instance type for training"
    Default: "ml.g5.2xlarge"
    AllowedValues:
      - "ml.g5.xlarge"
      - "ml.g5.2xlarge"
      - "ml.p4d.24xlarge"

  TrainBatchSize:
    Type: Number
    Description: "Per-device training batch size"
    Default: 1
    MinValue: 1
    MaxValue: 64

  MaxSteps:
    Type: Number
    Description: "Maximum training steps (-1 for unlimited, trains full epochs with early stopping)"
    Default: -1
    MinValue: -1
    MaxValue: 100000

  EvalSteps:
    Type: Number
    Description: "Evaluate dev set every N training steps"
    Default: 100
    MinValue: 10
    MaxValue: 1000

  EarlyStoppingPatience:
    Type: Number
    Description: "Stop training after N evaluations without improvement"
    Default: 3
    MinValue: 1
    MaxValue: 20

  LearningRate:
    Type: String
    Description: "Learning rate for training"
    Default: "5e-6"

  MaxSeqLength:
    Type: Number
    Description: "Maximum sequence length for tokenization (used in both scoring and training)"
    Default: 512
    MinValue: 128
    MaxValue: 2048

  # Deployment Configuration
  DeployEndpoint:
    Type: String
    Description: "Whether to deploy the fine-tuned model to a SageMaker endpoint"
    AllowedValues: ["true", "false"]
    Default: "true"

  RegisterConnector:
    Type: String
    Description: "Whether to register the SageMaker endpoint as an OpenSearch connector"
    AllowedValues: ["true", "false"]
    Default: "true"

  InferenceInstanceType:
    Type: String
    Description: "SageMaker GPU instance type for inference endpoint (GPU required)"
    Default: "ml.g5.xlarge"
    AllowedValues:
      - "ml.g4dn.xlarge"
      - "ml.g4dn.2xlarge"
      - "ml.g5.xlarge"
      - "ml.g5.2xlarge"

  InitialInstanceCount:
    Type: Number
    Description: "Initial instance count for inference endpoint"
    Default: 1
    MinValue: 1
    MaxValue: 4

  # Lambda Source URLs (GitHub Releases)
  DataExtractorLambdaZipUrl:
    Type: String
    Description: "URL to Data Extractor Lambda zip (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.1/data-extractor-lambda.zip"

  S3ValidatorLambdaZipUrl:
    Type: String
    Description: "URL to S3 Validator Lambda zip (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.1/s3-validator-lambda.zip"

  BedrockOrchestratorLambdaZipUrl:
    Type: String
    Description: "URL to Bedrock Orchestrator Lambda zip (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.1/bedrock-orchestrator-lambda.zip"

  RegisterModelLambdaZipUrl:
    Type: String
    Description: "URL to Register Model Lambda zip (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.1/register-model-lambda.zip"

  TrainingScriptZipUrl:
    Type: String
    Description: "URL to training script tar.gz (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.1/training-script.tar.gz"

Conditions:
  UseOpenSearchInput: !Equals [!Ref InputType, "opensearch"]
  UseS3Input: !Equals [!Ref InputType, "s3"]

