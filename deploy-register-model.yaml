AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploy a fine-tuned model to SageMaker using TEI (Text Embeddings Inference)
  and optionally register it as a remote model in OpenSearch.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Model Configuration"
        Parameters:
          - ModelName
          - ModelDataUrl
      - Label:
          default: "SageMaker Deployment"
        Parameters:
          - InferenceInstanceType
          - InitialInstanceCount
      - Label:
          default: "OpenSearch Registration"
        Parameters:
          - OpenSearchEndpoint
          - RegisterConnector
          - FineTuningLambdaInvokeOpenSearchRoleName
      - Label:
          default: "Lambda Source Configuration"
        Parameters:
          - RegisterModelLambdaZipUrl
    ParameterLabels:
      ModelName:
        default: "Model Name"
      ModelDataUrl:
        default: "Model Artifact S3 Path"
      InferenceInstanceType:
        default: "Inference Instance Type"
      InitialInstanceCount:
        default: "Initial Instance Count"
      OpenSearchEndpoint:
        default: "OpenSearch Domain Endpoint"
      RegisterConnector:
        default: "Register OpenSearch Connector"
      FineTuningLambdaInvokeOpenSearchRoleName:
        default: "Lambda OpenSearch Role Name"
      RegisterModelLambdaZipUrl:
        default: "Register Model Lambda Zip URL"

Parameters:
  ModelName:
    Type: String
    Description: "Unique name for the model (alphanumeric, hyphens only, max 40 chars)"
    AllowedPattern: "^[a-zA-Z0-9](-*[a-zA-Z0-9]){0,39}"
    ConstraintDescription: "Max 40 chars, alphanumeric and hyphens only"

  ModelDataUrl:
    Type: String
    Description: "S3 path to model.tar.gz (e.g., s3://bucket/path/model.tar.gz)"
    AllowedPattern: "^s3://.*"
    ConstraintDescription: "Must be a valid S3 path starting with s3://"

  OpenSearchEndpoint:
    Type: String
    Description: "OpenSearch domain endpoint (required if RegisterConnector is true)"
    AllowedPattern: "https://.*|^$"
    ConstraintDescription: "Must be a valid OpenSearch endpoint starting with https:// or empty"
    Default: ""

  RegisterConnector:
    Type: String
    Description: "Whether to register the SageMaker endpoint as an OpenSearch connector"
    AllowedValues: ["true", "false"]
    Default: "true"

  InferenceInstanceType:
    Type: String
    Description: "SageMaker GPU instance type for inference endpoint"
    Default: "ml.g5.xlarge"
    AllowedValues:
      - "ml.g4dn.xlarge"
      - "ml.g4dn.2xlarge"
      - "ml.g5.xlarge"
      - "ml.g5.2xlarge"

  InitialInstanceCount:
    Type: Number
    Description: "Initial instance count for inference endpoint"
    Default: 1
    MinValue: 1
    MaxValue: 4

  FineTuningLambdaInvokeOpenSearchRoleName:
    Type: String
    Default: "FineTuning-LambdaInvokeOpenSearchRole"
    AllowedPattern: "[a-zA-Z0-9+=,.@_-]+"
    ConstraintDescription: "Must use alphanumeric and '+=,.@-_' characters."
    Description: >
      The name of the IAM role used by Lambda to invoke OpenSearch domain.
      IMPORTANT: Before deploying this template, this role must be mapped to OpenSearch
      backend roles with appropriate permissions (e.g., ml_full_access for ML operations).
      The role will be created automatically if it does not exist.

  RegisterModelLambdaZipUrl:
    Type: String
    Description: "URL to Register Model Lambda zip (GitHub release)"
    Default: "https://github.com/zhichao-aws/opensearch-finetuning/releases/download/v1.0.0/register-model-lambda.zip"

Mappings:
  RegionMap:
    us-east-1:
      TEIImage: "683313688378.dkr.ecr.us-east-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-east-2:
      TEIImage: "257758044811.dkr.ecr.us-east-2.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-west-1:
      TEIImage: "746614075791.dkr.ecr.us-west-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-west-2:
      TEIImage: "246618743249.dkr.ecr.us-west-2.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    eu-west-1:
      TEIImage: "141502667606.dkr.ecr.eu-west-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    eu-central-1:
      TEIImage: "492215442770.dkr.ecr.eu-central-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    ap-northeast-1:
      TEIImage: "354813040037.dkr.ecr.ap-northeast-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
