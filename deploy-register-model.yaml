AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploy a fine-tuned model to SageMaker using TEI (Text Embeddings Inference)
  and optionally register it as a remote model in OpenSearch.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Model Configuration"
        Parameters:
          - ModelName
          - ModelDataUrl
      - Label:
          default: "SageMaker Deployment"
        Parameters:
          - InferenceInstanceType
          - InitialInstanceCount
      - Label:
          default: "OpenSearch Registration"
        Parameters:
          - OpenSearchEndpoint
          - RegisterConnector
          - FineTuningLambdaInvokeOpenSearchRoleName
    ParameterLabels:
      ModelName:
        default: "Model Name"
      ModelDataUrl:
        default: "Model Artifact S3 Path"
      InferenceInstanceType:
        default: "Inference Instance Type"
      InitialInstanceCount:
        default: "Initial Instance Count"
      OpenSearchEndpoint:
        default: "OpenSearch Domain Endpoint"
      RegisterConnector:
        default: "Register OpenSearch Connector"
      FineTuningLambdaInvokeOpenSearchRoleName:
        default: "Lambda OpenSearch Role Name"

Parameters:
  ModelName:
    Type: String
    Description: "Unique name for the model (alphanumeric, hyphens only, max 40 chars)"
    AllowedPattern: "^[a-zA-Z0-9](-*[a-zA-Z0-9]){0,39}"
    ConstraintDescription: "Max 40 chars, alphanumeric and hyphens only"

  ModelDataUrl:
    Type: String
    Description: "S3 path to model.tar.gz (e.g., s3://bucket/path/model.tar.gz)"
    AllowedPattern: "^s3://.*"
    ConstraintDescription: "Must be a valid S3 path starting with s3://"

  OpenSearchEndpoint:
    Type: String
    Description: "OpenSearch domain endpoint (required if RegisterConnector is true)"
    AllowedPattern: "https://.*|^$"
    ConstraintDescription: "Must be a valid OpenSearch endpoint starting with https:// or empty"
    Default: ""

  RegisterConnector:
    Type: String
    Description: "Whether to register the SageMaker endpoint as an OpenSearch connector"
    AllowedValues: ["true", "false"]
    Default: "true"

  InferenceInstanceType:
    Type: String
    Description: "SageMaker GPU instance type for inference endpoint"
    Default: "ml.g5.xlarge"
    AllowedValues:
      - "ml.g4dn.xlarge"
      - "ml.g4dn.2xlarge"
      - "ml.g5.xlarge"
      - "ml.g5.2xlarge"

  InitialInstanceCount:
    Type: Number
    Description: "Initial instance count for inference endpoint"
    Default: 1
    MinValue: 1
    MaxValue: 4

  FineTuningLambdaInvokeOpenSearchRoleName:
    Type: String
    Default: "FineTuning-LambdaInvokeOpenSearchRole"
    AllowedPattern: "[a-zA-Z0-9+=,.@_-]+"
    ConstraintDescription: "Must use alphanumeric and '+=,.@-_' characters."
    Description: >
      The name of the IAM role used by Lambda to invoke OpenSearch domain.
      IMPORTANT: Before deploying this template, this role must be mapped to OpenSearch
      backend roles with appropriate permissions (e.g., ml_full_access for ML operations).
      The role will be created automatically if it does not exist.

Conditions:
  ShouldRegisterConnector: !Equals [!Ref RegisterConnector, "true"]

Mappings:
  RegionMap:
    us-east-1:
      TEIImage: "683313688378.dkr.ecr.us-east-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-east-2:
      TEIImage: "257758044811.dkr.ecr.us-east-2.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-west-1:
      TEIImage: "746614075791.dkr.ecr.us-west-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    us-west-2:
      TEIImage: "246618743249.dkr.ecr.us-west-2.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    eu-west-1:
      TEIImage: "141502667606.dkr.ecr.eu-west-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    eu-central-1:
      TEIImage: "492215442770.dkr.ecr.eu-central-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    ap-northeast-1:
      TEIImage: "354813040037.dkr.ecr.ap-northeast-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    ap-southeast-1:
      TEIImage: "121021644041.dkr.ecr.ap-southeast-1.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"
    ap-southeast-2:
      TEIImage: "783357654285.dkr.ecr.ap-southeast-2.amazonaws.com/tei:2.0.1-tei1.8.2-gpu-py310-cu122-ubuntu22.04"

Resources:
  # =============================================================================
  # IAM Roles
  # =============================================================================

  # SageMaker Endpoint Role
  SageMakerEndpointRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ModelName}-SageMakerEndpointRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: "*"
        - PolicyName: ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/sagemaker/*"

  # OpenSearch Remote Inference Role
  OpenSearchRemoteInferenceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "OpenSearch-RemoteInference-${ModelName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: es.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              Service: es.aws.internal
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SageMakerInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                  - sagemaker:InvokeEndpointAsync
                Resource: "*"

  # Helper Lambda Role (for creating/managing the LambdaInvokeOpenSearch role)
  HelperLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ModelName}-HelperLambdaRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IAMAndLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:*:*:*"
              - Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:GetRolePolicy
                  - iam:PutRolePolicy
                  - iam:PassRole
                Resource: "*"

  # =============================================================================
  # Helper Lambda (creates LambdaInvokeOpenSearch role if not exists)
  # =============================================================================
  HelperLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: [HelperLambdaRole, OpenSearchRemoteInferenceRole]
    Properties:
      FunctionName: !Sub "${ModelName}-HelperLambda"
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt HelperLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          import time

          def lambda_handler(event, context):
              print(f"Event: {event}")
              if event['RequestType'] in ('Delete', 'Update'):
                  try:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  except Exception as e:
                      print(f"Error sending Delete/Update response: {e}")
                  return

              try:
                  props = event['ResourceProperties']
                  role_name = props['RoleName']
                  os_invoke_role_arn = props['OpenSearchInvokeModelRoleArn']
                  iam = boto3.client('iam')

                  # Create role if not exists
                  if not role_exists(iam, role_name):
                      create_role(iam, role_name)
                      print(f"Created role: {role_name}")

                  # Ensure PassRole policy for OpenSearchRemoteInferenceRole
                  ensure_passrole_policy(iam, role_name, os_invoke_role_arn)

                  role_arn = iam.get_role(RoleName=role_name)['Role']['Arn']
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                      {'RoleArn': role_arn})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def role_exists(iam, role_name):
              try:
                  iam.get_role(RoleName=role_name)
                  return True
              except iam.exceptions.NoSuchEntityException:
                  return False

          def create_role(iam, role_name):
              region = boto3.session.Session().region_name
              partition = 'aws-cn' if region.startswith('cn-') else 'aws-us-gov' if region.startswith('us-gov-') else 'aws'
              iam.create_role(
                  RoleName=role_name,
                  AssumeRolePolicyDocument=json.dumps({
                      "Version": "2012-10-17",
                      "Statement": [{
                          "Effect": "Allow",
                          "Principal": {"Service": "lambda.amazonaws.com"},
                          "Action": "sts:AssumeRole"
                      }]
                  }),
                  Description='Role for Lambda to invoke OpenSearch ML Commons')
              time.sleep(5)
              iam.put_role_policy(
                  RoleName=role_name,
                  PolicyName='OpenSearchAccess',
                  PolicyDocument=json.dumps({
                      "Version": "2012-10-17",
                      "Statement": [
                          {"Effect": "Allow", "Action": [
                              "logs:CreateLogGroup", "logs:CreateLogStream", "logs:PutLogEvents"
                          ], "Resource": "*"},
                          {"Effect": "Allow", "Action": [
                              "es:ESHttpGet", "es:ESHttpPost", "es:ESHttpPut", "es:ESHttpDelete"
                          ], "Resource": f"arn:{partition}:es:*:*:*"}
                      ]
                  }))
              time.sleep(5)

          def ensure_passrole_policy(iam, role_name, os_invoke_role_arn):
              policy_name = 'ModelPassRole'
              try:
                  existing = iam.get_role_policy(RoleName=role_name, PolicyName=policy_name)
                  policy = existing['PolicyDocument']
                  # Check if this role ARN already in policy
                  for stmt in policy.get('Statement', []):
                      if stmt.get('Resource') == os_invoke_role_arn:
                          print("PassRole policy already exists for this role")
                          return
                  policy['Statement'].append(
                      {"Effect": "Allow", "Action": ["iam:PassRole"], "Resource": os_invoke_role_arn})
                  iam.put_role_policy(RoleName=role_name, PolicyName=policy_name,
                      PolicyDocument=json.dumps(policy))
              except iam.exceptions.NoSuchEntityException:
                  iam.put_role_policy(
                      RoleName=role_name,
                      PolicyName=policy_name,
                      PolicyDocument=json.dumps({
                          "Version": "2012-10-17",
                          "Statement": [
                              {"Effect": "Allow", "Action": ["iam:PassRole"], "Resource": os_invoke_role_arn}
                          ]
                      }))
              time.sleep(5)
              print(f"PassRole policy updated for {os_invoke_role_arn}")

  # Custom Resource to setup the LambdaInvokeOpenSearch role
  SetupLambdaOpenSearchRole:
    Type: Custom::SetupRole
    DependsOn: [HelperLambdaFunction, OpenSearchRemoteInferenceRole]
    Properties:
      ServiceToken: !GetAtt HelperLambdaFunction.Arn
      RoleName: !Ref FineTuningLambdaInvokeOpenSearchRoleName
      OpenSearchInvokeModelRoleArn: !GetAtt OpenSearchRemoteInferenceRole.Arn

  # =============================================================================
  # Register Model Lambda (inline, handles CloudFormation custom resource)
  # =============================================================================
  RegisterModelLambda:
    Type: AWS::Lambda::Function
    Condition: ShouldRegisterConnector
    DependsOn: [SetupLambdaOpenSearchRole]
    Properties:
      FunctionName: !Sub "${ModelName}-RegisterModel"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      MemorySize: 512
      Role:
        Fn::Sub: "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${FineTuningLambdaInvokeOpenSearchRoleName}"
      Environment:
        Variables:
          OPENSEARCH_REMOTE_INFERENCE_ROLE_ARN: !GetAtt OpenSearchRemoteInferenceRole.Arn
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from botocore.auth import SigV4Auth
          from botocore.awsrequest import AWSRequest
          import urllib.request
          import urllib.error
          import cfnresponse
          import time

          def get_aws_auth():
              session = boto3.Session()
              credentials = session.get_credentials()
              return credentials, session.region_name

          def sign_request(method, url, data=None, headers=None):
              credentials, region = get_aws_auth()
              if headers is None:
                  headers = {}
              headers['Content-Type'] = 'application/json'
              body = json.dumps(data) if data else None
              request = AWSRequest(method=method, url=url, data=body, headers=headers)
              SigV4Auth(credentials, 'es', region).add_auth(request)
              return dict(request.headers), request.data

          def make_request(method, url, data=None):
              headers, signed_body = sign_request(method, url, data)
              req = urllib.request.Request(
                  url,
                  data=signed_body.encode('utf-8') if signed_body else None,
                  headers=headers,
                  method=method
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return json.loads(response.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8')
                  print(f"HTTP Error {e.code}: {error_body}")
                  raise

          def wait_for_task(opensearch_endpoint, task_id, max_attempts=60):
              url = f"{opensearch_endpoint}/_plugins/_ml/tasks/{task_id}"
              for attempt in range(max_attempts):
                  response = make_request('GET', url)
                  state = response.get('state')
                  print(f"Task {task_id} attempt {attempt+1}/{max_attempts}, state: {state}")
                  if state == 'COMPLETED':
                      return response.get('model_id')
                  elif state in ['FAILED', 'CANCELLED']:
                      raise Exception(f"Task failed: {state}, error: {response.get('error')}")
                  time.sleep(5)
              raise Exception(f"Task {task_id} timed out after {max_attempts} attempts")

          def handler(event, context):
              print(f"Event: {json.dumps(event)}")
              if event['RequestType'] in ('Delete', 'Update'):
                  try:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  except Exception as e:
                      print(f"Error sending Delete/Update response: {e}")
                  return
              try:
                  props = event['ResourceProperties']
                  opensearch_endpoint = props['OpenSearchEndpoint'].rstrip('/')
                  sagemaker_endpoint_name = props['SageMakerEndpointName']
                  model_name = props['ModelName']
                  role_arn = os.environ['OPENSEARCH_REMOTE_INFERENCE_ROLE_ARN']
                  _, region = get_aws_auth()

                  # Configure trusted connector endpoints
                  try:
                      make_request('PUT', f"{opensearch_endpoint}/_cluster/settings", {
                          "persistent": {
                              "plugins.ml_commons.trusted_connector_endpoints_regex": [
                                  "^https://runtime\\.sagemaker\\..*[a-z0-9-]\\.amazonaws\\.com/.*$"
                              ]
                          }
                      })
                  except Exception as e:
                      print(f"Warning: Could not set trusted endpoints: {e}")

                  # Create connector
                  resp = make_request('POST', f"{opensearch_endpoint}/_plugins/_ml/connectors/_create", {
                      "name": f"{model_name}-connector",
                      "description": f"Connector for fine-tuned dense model: {model_name}",
                      "version": 1,
                      "protocol": "aws_sigv4",
                      "parameters": {"region": region, "service_name": "sagemaker"},
                      "credential": {"roleArn": role_arn},
                      "actions": [{
                          "action_type": "predict",
                          "method": "POST",
                          "url": f"https://runtime.sagemaker.{region}.amazonaws.com/endpoints/{sagemaker_endpoint_name}/invocations",
                          "headers": {"Content-Type": "application/json"},
                          "request_body": '{"inputs": ${parameters.input}}',
                          "pre_process_function": "connector.pre_process.default.embedding",
                          "post_process_function": "connector.post_process.default.embedding"
                      }]
                  })
                  connector_id = resp['connector_id']
                  print(f"Created connector: {connector_id}")

                  # Create model group
                  resp = make_request('POST', f"{opensearch_endpoint}/_plugins/_ml/model_groups/_register", {
                      "name": f"{model_name}-group",
                      "description": f"Model group for: {model_name}"
                  })
                  model_group_id = resp['model_group_id']
                  print(f"Created model group: {model_group_id}")

                  # Register model
                  resp = make_request('POST', f"{opensearch_endpoint}/_plugins/_ml/models/_register", {
                      "name": model_name,
                      "function_name": "remote",
                      "model_group_id": model_group_id,
                      "description": "Fine-tuned dense retrieval model",
                      "connector_id": connector_id
                  })
                  model_id = wait_for_task(opensearch_endpoint, resp['task_id'])
                  print(f"Registered model: {model_id}")

                  # Deploy model
                  resp = make_request('POST', f"{opensearch_endpoint}/_plugins/_ml/models/{model_id}/_deploy")
                  wait_for_task(opensearch_endpoint, resp['task_id'])
                  print(f"Deployed model: {model_id}")

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'connector_id': connector_id,
                      'model_group_id': model_group_id,
                      'model_id': model_id
                  })
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # =============================================================================
  # SageMaker Resources
  # =============================================================================
  SageMakerModel:
    Type: AWS::SageMaker::Model
    Properties:
      ModelName: !Sub "${ModelName}-model"
      PrimaryContainer:
        Image: !FindInMap [RegionMap, !Ref "AWS::Region", TEIImage]
        ModelDataUrl: !Ref ModelDataUrl
        Environment:
          HF_MODEL_ID: "/opt/ml/model"
          TRUST_REMOTE_CODE: "true"
      ExecutionRoleArn: !GetAtt SageMakerEndpointRole.Arn

  SageMakerEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName: !Sub "${ModelName}-config"
      ProductionVariants:
        - VariantName: AllTraffic
          ModelName: !GetAtt SageMakerModel.ModelName
          InitialInstanceCount: !Ref InitialInstanceCount
          InstanceType: !Ref InferenceInstanceType

  SageMakerEndpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub "${ModelName}-endpoint"
      EndpointConfigName: !GetAtt SageMakerEndpointConfig.EndpointConfigName

  # =============================================================================
  # OpenSearch Registration (conditional)
  # =============================================================================
  InvokeRegisterModel:
    Type: Custom::RegisterModel
    Condition: ShouldRegisterConnector
    DependsOn: [SageMakerEndpoint]
    Properties:
      ServiceToken: !GetAtt RegisterModelLambda.Arn
      OpenSearchEndpoint: !Ref OpenSearchEndpoint
      SageMakerEndpointName: !Sub "${ModelName}-endpoint"
      ModelName: !Ref ModelName

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  EndpointName:
    Description: "SageMaker endpoint name"
    Value: !Sub "${ModelName}-endpoint"

  SageMakerEndpointRoleArn:
    Description: "SageMaker Endpoint Role ARN"
    Value: !GetAtt SageMakerEndpointRole.Arn

  OpenSearchRemoteInferenceRoleArn:
    Description: "OpenSearch Remote Inference Role ARN (map to ml_full_access in OpenSearch)"
    Value: !GetAtt OpenSearchRemoteInferenceRole.Arn

  FineTuningLambdaInvokeOpenSearchRoleArn:
    Description: "Lambda OpenSearch Role ARN (map to ml_full_access in OpenSearch before deployment)"
    Value:
      Fn::Sub: "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${FineTuningLambdaInvokeOpenSearchRoleName}"

  ConnectorId:
    Condition: ShouldRegisterConnector
    Description: "OpenSearch ML connector ID"
    Value: !GetAtt InvokeRegisterModel.connector_id

  ModelGroupId:
    Condition: ShouldRegisterConnector
    Description: "OpenSearch ML model group ID"
    Value: !GetAtt InvokeRegisterModel.model_group_id

  ModelId:
    Condition: ShouldRegisterConnector
    Description: "OpenSearch ML model ID"
    Value: !GetAtt InvokeRegisterModel.model_id
